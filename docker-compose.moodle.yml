# Local Moodle test environment for Zentrol LTI integration.
#
# Usage:
#   docker compose -f docker-compose.moodle.yml up -d --build
#
# First boot builds the image and installs Moodle (~5-8 min).
# Watch progress: docker compose -f docker-compose.moodle.yml logs -f moodle
#
# Moodle: http://localhost:8080   admin / Admin1234!
# Django: http://localhost:8000   (run separately: python manage.py runserver 0.0.0.0:8000)

services:
  moodle-db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    volumes:
      - moodle_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  moodle:
    build:
      context: ./docker
      dockerfile: Dockerfile.moodle
    ports:
      - "8080:80"
    environment:
      MOODLE_DB_HOST: moodle-db
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASS: moodlepass
      MOODLE_DB_NAME: moodle
      MOODLE_WWWROOT: http://localhost:8080
      MOODLE_ADMIN: admin
      MOODLE_ADMIN_PASSWORD: Admin1234!
      MOODLE_ADMIN_EMAIL: admin@local.test
    depends_on:
      moodle-db:
        condition: service_healthy
    volumes:
      - moodle_moodledata:/var/www/moodledata
    # host.docker.internal lets the Moodle container reach Django on your Mac
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  moodle_db_data:
  moodle_moodledata:
