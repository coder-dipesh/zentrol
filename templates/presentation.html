<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gesture-controlled presentation system using MediaPipe and Reveal.js">
    <title>Zentrol | Gesture Controlled Presentation</title>

    {% load static %}
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'media/logo/zentrol-icon.svg' %}">
    <link rel="apple-touch-icon" href="{% static 'media/logo/zentrol-icon.svg' %}">

    <!-- Tailwind CSS + daisyUI (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zentrol: {
                            navy: {
                                50:  '#E6EBF0',
                                100: '#C0CAD8',
                                200: '#99A9C0',
                                300: '#7288A8',
                                400: '#4B6790',
                                500: '#0F1E2E',
                                600: '#0D1A28',
                                700: '#0B1622',
                                800: '#09121C',
                                900: '#070E16'
                            },
                            teal: {
                                50:  '#E6FAF8',
                                100: '#C1F0EB',
                                200: '#9CE6DE',
                                300: '#77DCD1',
                                400: '#52D2C4',
                                500: '#1FB6AA',
                                600: '#1AA096',
                                700: '#168A82',
                                800: '#11746E',
                                900: '#0D5E5A'
                            },
                            gray: {
                                50:  '#F9FAFB',
                                100: '#F4F6F8',
                                200: '#E5E7EB',
                                300: '#D1D5DB',
                                400: '#9CA3AF',
                                500: '#6B7280',
                                600: '#4B5563',
                                700: '#374151',
                                800: '#1F2933',
                                900: '#111827'
                            }
                        }
                    }
                }
            }
        }
    </script>


    <style>
        .reveal img{
            max-width: 100% !important;
        }
    </style>

    <!-- Reveal.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/white.min.css">

</head>

<body data-session-id="{{ session_id }}" class="m-0 p-0 overflow-hidden font-sans antialiased bg-gradient-to-br from-zentrol-navy-500 to-zentrol-teal-600 text-white">
    <!-- CSRF Token -->
    {% csrf_token %}

    <!-- Skip to content link for accessibility -->
    <a href="#presentation-container" class="sr-only">Skip to presentation</a>

    <!-- Loading Overlay -->
    <aside id="loading-overlay" role="alert" aria-live="polite" class="fixed inset-0 w-full h-full bg-gradient-to-br from-zentrol-navy-500 to-zentrol-teal-600 flex flex-col justify-center items-center z-[2000] text-white transition-opacity duration-500">
        <div class="loader w-12 h-12 border-[5px] border-white/10 border-t-zentrol-teal-500 rounded-full animate-spin mb-5" aria-hidden="true"></div>
        <h3 class="text-xl font-bold mb-2">Initializing Gesture Detection</h3>
        <p class="mb-2">Please allow camera access when prompted</p>
        <p id="loading-status" class="text-sm opacity-75">Loading MediaPipe...</p>
    </aside>

    <!-- Main Presentation Container - full width, panels float over -->
    <main id="presentation-container" class="relative w-screen h-screen bg-gradient-to-br from-zentrol-navy-500 to-zentrol-teal-600 pt-[50px] pb-0 pl-0 pr-0 overflow-hidden transition-all duration-300">
        
        <!-- ========== Slide Filmstrip (desktop toggleable overview) ========== -->
        <button
            type="button"
            id="toggle-filmstrip-btn"
            class="hidden md:flex fixed left-3 top-[60px] z-[1000] h-9 px-3 rounded-2xl bg-white/95 text-zentrol-navy-700 shadow-md items-center justify-center border border-zentrol-gray-200/80 gap-2 active:scale-95"
            aria-label="Toggle slide overview"
        >
            <span class="text-base">▤</span>
            <span class="text-xs font-medium">Slides</span>
        </button>

        <aside
            id="slide-filmstrip"
            class="hidden md:flex fixed top-[100px] bottom-4 left-3 w-44 flex-col rounded-3xl overflow-hidden border border-white/20 bg-white/96 backdrop-blur-xl shadow-2xl z-[950]"
            aria-label="Slide overview"
        >
            <header class="flex items-center justify-between px-4 py-2 border-b border-zentrol-gray-200/80 bg-zentrol-gray-50/95">
                <span class="text-xs font-semibold uppercase tracking-wider text-zentrol-navy-700">Slides</span>
                <span id="slide-count-label" class="text-[11px] text-zentrol-gray-500"></span>
            </header>
            <div class="flex-1 overflow-y-auto bg-zentrol-gray-50/60 p-3 space-y-3">
                <!-- Hard-coded 10 thumbnails with overlay numbering badge -->
                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="0"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/1.png' %}" alt="Slide 1" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            1
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="1"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/2.png' %}" alt="Slide 2" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            2
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="2"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/3.png' %}" alt="Slide 3" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            3
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="3"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/4.png' %}" alt="Slide 4" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            4
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="4"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/5.png' %}" alt="Slide 5" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            5
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="5"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/6.png' %}" alt="Slide 6" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            6
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="6"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/7.png' %}" alt="Slide 7" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            7
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="7"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/8.png' %}" alt="Slide 8" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            8
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="8"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/9.png' %}" alt="Slide 9" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            9
                        </span>
                    </div>
                </button>

                <button
                    type="button"
                    class="slide-thumb group w-full rounded-2xl bg-transparent hover:bg-white/40 transition-all duration-150"
                    data-slide-index="9"
                >
                    <div class="relative w-full overflow-hidden rounded-2xl shadow-sm group-hover:shadow-md border border-zentrol-gray-200/70 bg-white">
                        <img src="{% static 'media/slides/10.png' %}" alt="Slide 10" class="w-full h-20 object-cover" />
                        <span class="absolute bottom-2 left-2 inline-flex items-center justify-center h-6 w-6 rounded-lg bg-white text-zentrol-navy-600 text-base font-medium shadow-[0_6px_14px_rgba(0,0,0,0.25)]">
                            10
                        </span>
                    </div>
                </button>
            </div>
        </aside>

        <!-- ========== RIGHT SIDEBAR: Video + Controls combined ========== -->
        <aside id="video-info-panel" class="floating-panel fixed top-[60px] right-3 md:right-3 w-[150px] sm:w-[160px] md:w-[190px] hidden md:flex flex-col rounded-2xl overflow-hidden border border-white/20 bg-white/95 dark:bg-zentrol-navy-700/95 backdrop-blur-xl shadow-xl z-[900] select-none text-[11px] md:text-xs" aria-label="Video and gesture controls">
            <!-- Panel header -->
            <div class="flex items-center justify-between px-3 py-1.5 border-b border-zentrol-gray-200/80 bg-zentrol-gray-50/90">
                <span class="text-[10px] font-semibold uppercase tracking-wider text-zentrol-navy-600">Video &amp; Controls</span>
            </div>

            <!-- Camera feed -->
            <video 
                id="camera-feed" 
                autoplay 
                playsinline 
                muted
                aria-label="Camera feed for gesture detection"
                class="w-full h-[110px] sm:h-[120px] md:h-[130px] bg-zentrol-navy-600 object-cover -scale-x-100"
            ></video>

            <!-- Gesture status -->
            <div id="gesture-overlay" aria-live="polite" aria-atomic="true" class="w-full px-3 py-2 bg-zentrol-teal-700/90 text-white text-center border-b border-zentrol-gray-200/60">
                <div id="gesture-icon" aria-hidden="true" class="text-3xl my-0.5">👋</div>
                <div id="gesture-name" class="text-[11px] font-semibold my-0.5 min-h-[16px] text-white">Show your hand...</div>
                <div id="gesture-confidence" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" class="h-1.5 bg-zentrol-teal-800 rounded overflow-hidden my-1.5">
                    <div id="confidence-bar" class="h-full bg-zentrol-teal-400 transition-[width] duration-300 ease-out"></div>
                </div>
                <div class="text-[10px] mt-1 flex justify-around font-mono text-zentrol-gray-300">
                    FPS: <span id="fps-counter">0</span> | <span id="latency-counter">0</span>ms
                </div>
            </div>

            <!-- Gesture legend -->
            <ul id="controls-gesture-panel" class="flex flex-col px-2 pt-2 pb-1 gap-0.5 list-none m-0 text-zentrol-navy-700 border-b border-zentrol-gray-200/80" role="list">
                <li class="gesture-item flex items-center px-2.5 py-1.5 rounded-lg transition-all duration-200 hover:bg-zentrol-teal-50">
                    <span class="gesture-emoji text-lg mr-2" aria-hidden="true">👍</span>
                    <span class="gesture-action text-[11px] font-medium">Previous</span>
                </li>
                <li class="gesture-item flex items-center px-2.5 py-1.5 rounded-lg transition-all duration-200 hover:bg-zentrol-teal-50">
                    <span class="gesture-emoji text-lg mr-2" aria-hidden="true">✌️</span>
                    <span class="gesture-action text-[11px] font-medium">Next</span>
                </li>
                <li class="gesture-item flex items-center px-2.5 py-1.5 rounded-lg transition-all duration-200 hover:bg-zentrol-teal-50">
                    <span class="gesture-emoji text-lg mr-2" aria-hidden="true">🖐️</span>
                    <span class="gesture-action text-[11px] font-medium">Fullscreen</span>
                </li>
                <li class="gesture-item flex items-center px-2.5 py-1.5 rounded-lg transition-all duration-200 hover:bg-zentrol-teal-50">
                    <span class="gesture-emoji text-lg mr-2" aria-hidden="true">✊</span>
                    <span class="gesture-action text-[11px] font-medium">Exit</span>
                </li>
                <li class="gesture-item flex items-center px-2.5 py-1.5 rounded-lg transition-all duration-200 hover:bg-zentrol-teal-50">
                    <span class="gesture-emoji text-lg mr-2" aria-hidden="true">☝️</span>
                    <span class="gesture-action text-[11px] font-medium">Reset</span>
                </li>
            </ul>

            <!-- Action buttons -->
            <nav class="px-2.5 pb-2 pt-1 flex flex-col gap-1.5" aria-label="Presentation controls">
                <button class="control-btn btn btn-xs md:btn-sm w-full gap-1.5 normal-case bg-zentrol-teal-500 hover:bg-zentrol-teal-400 border-none text-white" onclick="Reveal.prev()" aria-label="Previous slide">
                    <span class="text-base" aria-hidden="true">◀</span>
                    <span>Previous</span>
                </button>
                <button class="control-btn btn btn-xs md:btn-sm w-full gap-1.5 normal-case bg-zentrol-teal-500 hover:bg-zentrol-teal-400 border-none text-white" onclick="Reveal.next()" aria-label="Next slide">
                    <span>Next</span>
                    <span class="text-base" aria-hidden="true">▶</span>
                </button>
                <button class="control-btn btn btn-xs md:btn-sm w-full gap-1.5 normal-case bg-zentrol-teal-700 hover:bg-zentrol-teal-600 border-none text-white" onclick="presentationController.toggleFullscreenDirect()" aria-label="Toggle fullscreen">
                    <span class="text-base" aria-hidden="true">⛶</span>
                    <span>Fullscreen</span>
                </button>
            </nav>
        </aside>

        <!-- Header: logo only -->
        <header class="gesture-guide fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-sm text-zentrol-navy-500 py-2 px-4 border-b border-zentrol-gray-200/80 z-[1000] shadow-sm flex items-center min-h-[50px]" aria-label="Presentation header">
            <a href="/" target="_self" rel="noopener noreferrer" class="flex items-center gap-2" title="Zentrol">
                <img src="{% static 'media/logo/zentrol-icon.svg' %}" alt="Zentrol Logo" class="h-7 md:h-8 w-auto">
                <span class="font-semibold text-zentrol-navy-700 text-sm md:text-base">Zentrol</span>
            </a>
        </header>

        <!-- Mobile toggles for panels -->
        <button
            type="button"
            id="toggle-video-panel-btn"
            class="md:hidden fixed left-2 top-1/2 -translate-y-1/2 z-[1000] h-10 w-10 rounded-2xl bg-white/90 text-zentrol-navy-700 shadow-md flex items-center justify-center border border-zentrol-gray-200/80 active:scale-95"
            aria-label="Toggle video panel"
        >
            <span class="text-xl">🎥</span>
        </button>

        <button
            type="button"
            id="toggle-controls-panel-btn"
            class="md:hidden fixed right-2 top-1/2 -translate-y-1/2 z-[1000] h-10 w-10 rounded-2xl bg-white/90 text-zentrol-navy-700 shadow-md flex items-center justify-center border border-zentrol-gray-200/80 active:scale-95"
            aria-label="Toggle controls panel"
        >
            <span class="text-lg">☰</span>
        </button>
        
        <!-- Centered Reveal.js Presentation Container (maximize vertical space) -->
        <!-- md:px-[220px] chosen so gap between slide and side panels ≈ 24px on desktop -->
        <section class="h-[calc(100vh-50px)] md:h-[calc(100vh-50px)] flex items-stretch justify-center px-2 sm:px-6 md:px-[210px] pb-0">
            <div class="reveal h-full w-full max-w-7xl mx-auto overflow-hidden flex items-stretch" role="region" aria-label="Presentation slides">
                <div class="slides h-full w-full overflow-hidden">
                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%)] max-h-[calc(100%)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/1.png' %}" alt="Gesture Controlled Presentation - Slide 1">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/2.png' %}" alt="Gesture Controlled Presentation - Slide 2">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/3.png' %}" alt="Gesture Controlled Presentation - Slide 3">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/4.png' %}" alt="Gesture Controlled Presentation - Slide 4">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/5.png' %}" alt="Gesture Controlled Presentation - Slide 5">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/6.png' %}" alt="Gesture Controlled Presentation - Slide 6">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/7.png' %}" alt="Gesture Controlled Presentation - Slide 7">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/8.png' %}" alt="Gesture Controlled Presentation - Slide 8">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/9.png' %}" alt="Gesture Controlled Presentation - Slide 9">
                    </section>

                    <section class="w-full h-full p-0 m-0 flex items-center justify-center box-border overflow-hidden">
                        <img id="slide-image" class="max-w-[calc(100%-24px)] max-h-[calc(100%-8px)] w-auto h-auto object-contain rounded-2xl shadow-2xl bg-white mx-3 my-1" src="{% static 'media/slides/10.png' %}" alt="Gesture Controlled Presentation - Slide 10">
                    </section>
                </div>
            </div>
        </section>

    </main>

    <!-- JavaScript Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"></script>

    <!-- MediaPipe Dependencies -->
    <script src="{% static 'mediapipe/hands.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <!-- Custom Scripts -->
    <script src="{% static 'js/gesture_engine.js' %}"></script>
    <script src="{% static 'js/presentation.js' %}"></script>

    <!-- Main Application Script -->
    <script>
        'use strict';

        // ================================================================
        // Initialize Reveal.js
        // ================================================================
        Reveal.initialize({
            controls: false,
            progress: true,
            center: true,
            hash: true,
            transition: 'slide',
            transitionSpeed: 'default',
            backgroundTransition: 'fade',
            width: '100%',
            height: '100%',
            margin: 0,
            minScale: 1,
            maxScale: 1,
            
            // Accessibility
            keyboardCondition: 'focused',
            
            // Performance
            viewDistance: 3,
            mobileViewDistance: 2
        });

        // ================================================================
        // Initialize Gesture Engine
        // ================================================================
        var videoElement = document.getElementById('camera-feed');
        var gestureEngine = new GestureEngine({
            profile: 'balanced',  // Options: 'responsive', 'balanced', 'high-accuracy'
            debug: false          // Set to true for development
        });

        async function initializeGestureControl() {
            console.log('🎬 Starting gesture control initialization...');

            try {
                const success = await gestureEngine.start(videoElement);

                if (success) {
                    console.log('✅ Gesture control initialized successfully');
                    startPerformanceMonitoring();
                } else {
                    throw new Error('Gesture engine failed to start');
                }

            } catch (error) {
                console.error('❌ Initialization failed:', error);
                
                const statusEl = document.getElementById('loading-status');
                if (statusEl) {
                    statusEl.innerHTML = `
                        <span class="text-red-400">
                            ⚠️ Failed to initialize gesture control<br>
                            <small>${error.message}</small>
                        </span>
                    `;
                }

                // Hide overlay after delay
                setTimeout(() => {
                    const overlay = document.getElementById('loading-overlay');
                    if (overlay) {
                        overlay.style.display = 'none';
                    }
                }, 3000);
            }
        }

        // ================================================================
        // Performance Monitoring (FIXED)
        // ================================================================
        function startPerformanceMonitoring() {
            setInterval(() => {
                // Safe access with null checks
                if (!gestureEngine || !gestureEngine.metrics) return;
                
                const metrics = gestureEngine.metrics.getMetrics();
                
                const fpsEl = document.getElementById('fps-counter');
                const latencyEl = document.getElementById('latency-counter');
                
                if (fpsEl) fpsEl.textContent = Math.round(metrics.fps);
                if (latencyEl) latencyEl.textContent = Math.round(metrics.avgDetectionTime);
            }, 1000);
        }

        // ================================================================
        // Cleanup on Page Unload
        // ================================================================
        window.addEventListener('beforeunload', () => {
            if (gestureEngine) {
                gestureEngine.stop();
            }
        });

        // ================================================================
        // Start Application
        // ================================================================
        window.addEventListener('load', () => {
            initializeGestureControl();
            
            // Mobile: toggle side panels
            const videoPanel = document.getElementById('video-info-panel');
            const controlsPanel = document.getElementById('controls-gesture-panel');
            const videoBtn = document.getElementById('toggle-video-panel-btn');
            const controlsBtn = document.getElementById('toggle-controls-panel-btn');
            const filmstrip = document.getElementById('slide-filmstrip');
            const filmstripBtn = document.getElementById('toggle-filmstrip-btn');

            function isMobile() {
                return window.innerWidth < 768;
            }

            if (videoBtn && videoPanel) {
                videoBtn.addEventListener('click', () => {
                    if (!isMobile()) return;
                    videoPanel.classList.toggle('hidden');
                    videoPanel.classList.toggle('flex');
                });
            }

            if (controlsBtn && controlsPanel) {
                controlsBtn.addEventListener('click', () => {
                    if (!isMobile()) return;
                    controlsPanel.classList.toggle('hidden');
                    controlsPanel.classList.toggle('flex');
                });
            }

            // Desktop: toggle filmstrip & adjust video panel to avoid overlap
            if (filmstripBtn && filmstrip) {
                filmstripBtn.addEventListener('click', () => {
                    const isHidden = filmstrip.classList.contains('hidden');
                    filmstrip.classList.toggle('hidden', !isHidden ? true : false);
                    filmstrip.classList.toggle('flex', isHidden);
                });
            }

            // Slide filmstrip thumbnail navigation
            const thumbs = document.querySelectorAll('.slide-thumb[data-slide-index]');
            thumbs.forEach((thumb) => {
                thumb.addEventListener('click', () => {
                    const index = parseInt(thumb.dataset.slideIndex || '0', 10);
                    if (!Number.isNaN(index) && window.Reveal) {
                        window.Reveal.slide(index);
                    }
                });
            });
        });

        // ================================================================
        // Error Recovery
        // ================================================================
        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error);
            
            // Prevent complete failure
            event.preventDefault();
        });

        // ================================================================
        // Keyboard Shortcuts Info (CORRECTED)
        // ================================================================
        console.log(`
╔════════════════════════════════════════════════════════╗
║  GESTURE-CONTROLLED PRESENTATION                       ║
╠════════════════════════════════════════════════════════╣
║  Gestures:                                             ║
║    👍 Thumbs Up     → Previous Slide                  ║
║    ✌️  Peace Sign    → Next Slide                     ║
║    🖐️ Open Palm     → Toggle Fullscreen               ║
║    ✊ Fist          → Exit Fullscreen                 ║
║    ☝️ Point Up      → Reset to First Slide            ║
║                                                        ║
║  Keyboard Shortcuts:                                   ║
║    Ctrl/Cmd + F     → Toggle Fullscreen               ║
║    Ctrl/Cmd + R     → Reset Presentation              ║
║    Arrow Keys       → Navigate Slides                 ║
╚════════════════════════════════════════════════════════╝
        `);
    </script>
