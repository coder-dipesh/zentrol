<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset | Zentrol</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-md items-center px-4">
    <section class="w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold">Reset password</h1>
      <p class="mt-1 text-sm text-slate-500">Enter your email to receive a reset link.</p>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
          <label for="{{ form.email.id_for_label }}" class="mb-1 block text-sm font-medium">Email</label>
          <div class="[&>input]:w-full [&>input]:rounded-lg [&>input]:border [&>input]:border-slate-300 [&>input]:px-3 [&>input]:py-2">{{ form.email }}</div>
        </div>
        <button type="submit" class="w-full rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">Send reset link</button>
      </form>
      <p class="mt-4 text-sm"><a href="{% url 'login' %}" class="text-teal-700">Back to login</a></p>
    </section>
  </main>
</body>
</html>
