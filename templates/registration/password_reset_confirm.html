<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | Zentrol</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-md items-center px-4">
    <section class="w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold">Set a new password</h1>
      {% if validlink %}
        <form method="post" class="mt-6 space-y-4">
          {% csrf_token %}
          {% for field in form %}
            <div>
              <label class="mb-1 block text-sm font-medium" for="{{ field.id_for_label }}">{{ field.label }}</label>
              <div class="[&>input]:w-full [&>input]:rounded-lg [&>input]:border [&>input]:border-slate-300 [&>input]:px-3 [&>input]:py-2">{{ field }}</div>
              {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors|striptags }}</p>{% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="w-full rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">Update password</button>
        </form>
      {% else %}
        <p class="mt-3 text-sm text-red-600">The reset link is invalid or has expired. Request a new one.</p>
        <p class="mt-4 text-sm"><a href="{% url 'password_reset' %}" class="text-teal-700">Request new reset link</a></p>
      {% endif %}
    </section>
  </main>
</body>
</html>
