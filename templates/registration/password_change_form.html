<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change password | Zentrol</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-md items-center px-4">
    <section class="w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold">Change password</h1>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {% if form.non_field_errors %}<p class="text-sm text-red-600">{{ form.non_field_errors|striptags }}</p>{% endif %}
        {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="mb-1 block text-sm font-medium">{{ field.label }}</label>
          <div class="[&>input]:w-full [&>input]:rounded-lg [&>input]:border [&>input]:border-slate-300 [&>input]:px-3 [&>input]:py-2">{{ field }}</div>
          {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors|striptags }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">Update password</button>
      </form>
      <p class="mt-4 text-center text-sm"><a href="{% url 'dashboard' %}" class="text-teal-700">Back to dashboard</a></p>
    </section>
  </main>
<script>
  (function () {
    const eyeOn =
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5" aria-hidden="true">' +
      '<path d="M1.5 12s4.5-7.5 10.5-7.5S22.5 12 22.5 12s-4.5 7.5-10.5 7.5S1.5 12 1.5 12Z" />' +
      '<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />' +
      '</svg>';
    const eyeOff =
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5" aria-hidden="true">' +
      '<path d="M1.5 12s4.5-7.5 10.5-7.5S22.5 12 22.5 12s-4.5 7.5-10.5 7.5S1.5 12 1.5 12Z" />' +
      '<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />' +
      '<path d="M3 3l18 18" />' +
      '</svg>';

    document.querySelectorAll('input[type="password"]').forEach(function (input) {
      if (!input || input.dataset.pwToggleInit === '1') return;
      input.dataset.pwToggleInit = '1';

      const wrapper = input.parentElement;
      if (!wrapper) return;
      wrapper.style.position = 'relative';

      input.classList.add('pr-10');

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className =
        'absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700 focus:outline-none';
      btn.innerHTML = eyeOn;
      btn.setAttribute('aria-label', 'Show password');

      function syncIcon() {
        const showing = input.type === 'text';
        btn.innerHTML = showing ? eyeOff : eyeOn;
        btn.setAttribute('aria-label', showing ? 'Hide password' : 'Show password');
      }

      btn.addEventListener('click', function () {
        input.type = input.type === 'password' ? 'text' : 'password';
        syncIcon();
      });

      wrapper.appendChild(btn);
      syncIcon();
    });
  })();
</script>
</body>
</html>
