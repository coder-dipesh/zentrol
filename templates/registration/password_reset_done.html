<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Email Sent | Zentrol</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-md items-center px-4">
    <section class="w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold">Check your email</h1>
      <p class="mt-2 text-sm text-slate-600">If an account exists for that email, a password reset link has been sent.</p>
      <p class="mt-4 text-sm"><a href="{% url 'login' %}" class="text-teal-700">Back to login</a></p>
    </section>
  </main>
</body>
</html>
