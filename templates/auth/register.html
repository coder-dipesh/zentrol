{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Zentrol</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-md items-center px-4">
    <section class="w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold">Create account</h1>
      <p class="mt-1 text-sm text-slate-500">Use Zentrol dashboard and saved presentations.</p>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700" for="{{ field.id_for_label }}">{{ field.label }}</label>
            <div class="[&>input]:w-full [&>input]:rounded-lg [&>input]:border [&>input]:border-slate-300 [&>input]:px-3 [&>input]:py-2 [&>input]:text-sm [&>input]:focus:outline-none [&>input]:focus:ring-2 [&>input]:focus:ring-teal-200">{{ field }}</div>
            {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors|striptags }}</p>{% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="w-full rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">Create account</button>
      </form>
      <p class="mt-4 text-sm text-slate-600">Already have an account? <a href="{% url 'login' %}" class="font-medium text-teal-700">Login</a></p>
    </section>
  </main>
</body>
</html>
