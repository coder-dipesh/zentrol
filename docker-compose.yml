# Local PostgreSQL for development parity with staging/production.
# Usage: docker compose up -d
# Then set DATABASE_URL in `.env` (see `.env.example` and docs/DEPLOYMENT.md).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zentrol
      POSTGRES_PASSWORD: zentrol
      POSTGRES_DB: zentrol
    ports:
      - "5432:5432"
    volumes:
      - zentrol_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zentrol -d zentrol"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  zentrol_pgdata:
